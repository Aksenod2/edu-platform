# Авто-синхронизация deploy-веток для Timeweb App Platform.
# При пуше в main пересобирает tw-api и tw-web (= main + корневой one-service compose).
# Timeweb (репозиторий подключён через GitHub-аккаунт, авто-сборка включена на обоих
# приложениях, ветки tw-api/tw-web) сам запускает деплой по этим пушам.
name: Sync Timeweb deploy branches
on:
  push:
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: timeweb-deploy-sync
  cancel-in-progress: false
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Sync tw-api
        run: |
          git checkout -B tw-api "$GITHUB_SHA"
          cp deploy/compose/api.yml docker-compose.yml
          git add docker-compose.yml
          # --allow-empty: если корневой docker-compose.yml в main уже совпадает,
          # коммит всё равно создаётся, чтобы сдвинуть HEAD и запустить пересборку.
          git commit --allow-empty -m "deploy: sync tw-api from main ${GITHUB_SHA::7}"
          git push -f origin tw-api
      - name: Sync tw-web
        run: |
          git checkout -B tw-web "$GITHUB_SHA"
          cp deploy/compose/web.yml docker-compose.yml
          git add docker-compose.yml
          git commit --allow-empty -m "deploy: sync tw-web from main ${GITHUB_SHA::7}"
          git push -f origin tw-web
