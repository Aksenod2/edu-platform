name: Deploy to VPS
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: vps-deploy
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "$VPS_SSH_USER@$VPS_SSH_HOST" "set -e; export GIT_TERMINAL_PROMPT=0; cd /root/edu-platform && git fetch --quiet origin main && git reset --hard origin/main && bash scripts/vps-up.sh"

      # Деплой не считается успешным, пока API реально не отвечает: ловит
      # крашлуп контейнера (инцидент с PR #133 — workflow «зелёный», прод лежит).
      - name: Проверка здоровья API после выката
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://xn--90ad2cb.xn--p1ai/api-proxy/health" || true)
            if [ "$status" = "200" ]; then
              echo "API здоров (попытка $i)"; exit 0
            fi
            echo "API ещё не отвечает (код $status, попытка $i/30) — жду 10с"
            sleep 10
          done
          echo "::error::API не поднялся за 5 минут после выката — смотри логи контейнера"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "$VPS_SSH_USER@$VPS_SSH_HOST" "cd /root/edu-platform && docker compose --env-file .env.vps -f docker-compose.vps.yml logs --tail 50 api" || true
          exit 1
