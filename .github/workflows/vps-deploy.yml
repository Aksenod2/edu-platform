name: Deploy to VPS
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: vps-deploy
  cancel-in-progress: false

# Публичный прод-URL (punycode губу.рф) — раннер достукивается до него извне,
# даже несмотря на то что censorship режет ИСХОДЯЩИЕ запросы с самого VPS.
env:
  PROD_URL: https://xn--90ad2cb.xn--p1ai

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # 1. Выкат: сохраняем предыдущий рабочий SHA → reset на новый → up --build.
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    outputs:
      prev_sha: ${{ steps.deploy.outputs.prev_sha }}
    steps:
      - name: Deploy over SSH
        id: deploy
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Узнаём SHA, на котором прод работал ДО этого выката, и кладём его в
          # файл .last-good-sha на VPS — это якорь авто-отката (job rollback).
          PREV_SHA=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "$VPS_SSH_USER@$VPS_SSH_HOST" \
            "cd /root/edu-platform && git rev-parse HEAD")
          echo "Предыдущий рабочий SHA прода: $PREV_SHA"
          echo "prev_sha=$PREV_SHA" >> "$GITHUB_OUTPUT"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "$VPS_SSH_USER@$VPS_SSH_HOST" \
            "set -e; export GIT_TERMINAL_PROMPT=0; cd /root/edu-platform && \
             echo \"$PREV_SHA\" > .last-good-sha && \
             git fetch --quiet origin main && git reset --hard origin/main && bash scripts/vps-up.sh"

      # Деплой не считается успешным, пока API реально не отвечает: ловит
      # крашлуп контейнера (инцидент с PR #133 — workflow «зелёный», прод лежит).
      - name: Проверка здоровья API после выката
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$PROD_URL/api-proxy/health" || true)
            if [ "$status" = "200" ]; then
              echo "API здоров (попытка $i)"; exit 0
            fi
            echo "API ещё не отвечает (код $status, попытка $i/30) — жду 10с"
            sleep 10
          done
          echo "::error::API не поднялся за 5 минут после выката — смотри логи контейнера"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # 2. Замок выпуска: блокирующий @smoke живым браузером против прода (#174).
  #    Красный Playwright РОНЯЕТ job (никаких || true / continue-on-error),
  #    что триггерит rollback ниже.
  # ───────────────────────────────────────────────────────────────────────────
  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Установка зависимостей
        working-directory: .
        run: pnpm install --frozen-lockfile

      # Кэшируем браузеры Playwright по его версии — не тянем Chromium каждый раз
      # (и не упираемся в лимиты сторонних реестров).
      - name: Версия Playwright
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Кэш браузеров Playwright
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Установка Chromium (если не из кэша)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Системные зависимости Chromium (на попадание в кэш)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      # БЛОКИРУЮЩИЙ прогон. Ненулевой exit Playwright роняет шаг и весь job.
      - name: Smoke против прода (@smoke)
        env:
          E2E_BASE_URL: ${{ env.PROD_URL }}
          E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL }}
          E2E_STUDENT_PASSWORD: ${{ secrets.E2E_STUDENT_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: pnpm exec playwright test --grep @smoke

      - name: Отчёт Playwright (артефакт при падении)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # 3. Авто-откат: при красном smoke возвращаем прод на предыдущий рабочий SHA.
  #    MTTR — минуты: git reset на .last-good-sha + пересборка + health.
  # ───────────────────────────────────────────────────────────────────────────
  rollback:
    needs: [deploy, smoke]
    if: failure() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Откат прода на предыдущий рабочий SHA
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
          PREV_SHA: ${{ needs.deploy.outputs.prev_sha }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          echo "::warning::Smoke красный — откатываю прод на $PREV_SHA"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "$VPS_SSH_USER@$VPS_SSH_HOST" \
            "set -e; cd /root/edu-platform && \
             TARGET=\$(cat .last-good-sha 2>/dev/null || echo '$PREV_SHA') && \
             echo \"Возврат на \$TARGET\" && \
             git reset --hard \"\$TARGET\" && bash scripts/vps-up.sh"

      - name: Проверка здоровья после отката
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$PROD_URL/api-proxy/health" || true)
            if [ "$status" = "200" ]; then
              echo "Прод восстановлен после отката (попытка $i)"; exit 0
            fi
            echo "Прод ещё не отвечает после отката (код $status, попытка $i/30) — жду 10с"
            sleep 10
          done
          echo "::error::Прод НЕ восстановился после отката — нужен ручной разбор по SSH"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "$VPS_SSH_USER@$VPS_SSH_HOST" \
            "cd /root/edu-platform && docker compose --env-file .env.vps -f docker-compose.vps.yml logs --tail 50 api" || true
          exit 1
