name: Сборка и деплой образов

# Обходим лимит build-минут Render: образы собираются здесь (бесплатные
# минуты GitHub Actions), пушатся в GHCR (приватные), а Render тянет готовый
# образ по Registry Credentials. На Render ничего не собирается.
#
# Что настроить один раз:
# 1. PAT: создать GitHub Personal Access Token (classic) со scope read:packages.
# 2. Render → Workspace Settings → Registry Credentials → добавить ghcr.io:
#      Name  = ghcr            (ВАЖНО: ровно это имя, оно прописано в render.yaml)
#      User  = Aksenod2
#      Token = PAT из п.1
#    (имя `ghcr` связывает креды с image.creds.fromRegistryCreds.name в render.yaml)
# 3. Сервисы platform-api / platform-web уже описаны в render.yaml как
#    runtime: image на ghcr.io/aksenod2/edu-platform-{api,web}:latest.
#    Все runtime-env (DATABASE_URL, JWT_SECRET, S3_*, SMTP_*, CORS_ORIGIN у api)
#    задаются на Render и не зависят от источника сборки.
# 4. Создать Deploy Hook у каждого сервиса и добавить URL'ы в Secrets репозитория:
#      RENDER_DEPLOY_HOOK_API, RENDER_DEPLOY_HOOK_WEB
# 5. (web) Задать переменную репозитория NEXT_PUBLIC_API_URL (Settings → Variables)
#    — она встраивается в web-образ на этапе сборки здесь (build-arg ниже).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Логин в GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Метаданные образа
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/aksenod2/edu-platform-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Сборка и пуш
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Деплой platform-api (Render hook)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
        run: |
          if [ -n "$HOOK" ]; then curl -fsSL -X POST "$HOOK" && echo "api: deploy triggered"; else echo "RENDER_DEPLOY_HOOK_API не задан — пропускаю"; fi
      - name: Деплой platform-web (Render hook)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_WEB }}
        run: |
          if [ -n "$HOOK" ]; then curl -fsSL -X POST "$HOOK" && echo "web: deploy triggered"; else echo "RENDER_DEPLOY_HOOK_WEB не задан — пропускаю"; fi
