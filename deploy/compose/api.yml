# Продакшн-compose для приложения API (Timeweb App Platform).
# GitHub Action кладёт этот файл в КОРЕНЬ ветки tw-api как docker-compose.yml.
# Один сервис → получает HTTPS на главном домене. ${...} — переменные приложения (заданы в Timeweb).
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=${PORT}
      - HOST=${HOST}
      - NODE_ENV=${NODE_ENV}
      - JWT_SECRET=${JWT_SECRET}
      - API_BASE_URL=${API_BASE_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      # SMTP — отправка писем (сброс пароля, уведомления). Значения задаются в панели Timeweb.
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      # VAPID — web-push уведомления.
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
    ports:
      - "4000:4000"
