<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <title>Нет соединения — OCHOBA</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #0a0a0a;
        --muted: #737373;
        --card: #fafafa;
        --border: #e5e5e5;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --fg: #fafafa;
          --muted: #a3a3a3;
          --card: #171717;
          --border: #262626;
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family:
          ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        padding-top: max(24px, env(safe-area-inset-top));
        padding-bottom: max(24px, env(safe-area-inset-bottom));
      }
      .card {
        max-width: 420px;
        width: 100%;
        text-align: center;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px 24px;
      }
      .badge {
        width: 56px;
        height: 56px;
        margin: 0 auto 20px;
        border-radius: 14px;
        background: #171717;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.5px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
        margin: 0 0 24px;
      }
      button {
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        background: var(--fg);
        color: var(--bg);
        border: none;
        border-radius: 10px;
        padding: 12px 20px;
        width: 100%;
      }
      button:active {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">OCHOBA</div>
      <h1>Нет соединения</h1>
      <p>
        Похоже, интернет недоступен. Проверьте подключение к сети и попробуйте
        обновить страницу.
      </p>
      <button type="button" onclick="location.reload()">Обновить</button>
    </main>
  </body>
</html>
