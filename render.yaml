databases:
  - name: platform-db
    plan: free
    databaseName: platform
    user: platform

services:
  - type: web
    name: platform-api
    plan: free
    runtime: node
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm db:generate && pnpm --filter @platform/api build
    preDeployCommand: cd packages/db && npx prisma db push --skip-generate && npx tsx prisma/seed.ts
    startCommand: cd apps/api && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: platform-db
          property: connectionString
      - key: PORT
        value: "4000"
      - key: HOST
        value: "0.0.0.0"
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: platform-uploads
      - key: S3_REGION
        value: us-east-1

  - type: web
    name: platform-web
    plan: free
    runtime: node
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @platform/web build
    startCommand: cd apps/web && node .next/standalone/apps/web/server.js
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
