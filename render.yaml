databases:
  - name: platform-db
    plan: free
    databaseName: platform
    user: platform

services:
  - type: web
    name: platform-api
    plan: free
    runtime: image
    image:
      url: ghcr.io/aksenod2/edu-platform-api:latest
      creds:
        fromRegistryCreds:
          name: ghcr
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: platform-db
          property: connectionString
      - key: PORT
        value: "4000"
      - key: HOST
        value: "0.0.0.0"
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: platform-uploads
      - key: S3_REGION
        value: us-east-1
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  - type: web
    name: platform-web
    plan: free
    runtime: image
    image:
      url: ghcr.io/aksenod2/edu-platform-web:latest
      creds:
        fromRegistryCreds:
          name: ghcr
